    <!-- GA4 Analytics — consent-gated per DPDPA 2023 -->
    <script>
      // Default consent denied until user accepts — DPDPA 2023 compliance
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('consent', 'default', {
        'analytics_storage': 'denied',
        'ad_storage': 'denied',
        'ad_user_data': 'denied',
        'ad_personalization': 'denied'
      });
    </script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-8L9EQTY2P3"></script>
    <script>
      gtag('js', new Date());
      gtag('config', 'G-8L9EQTY2P3', { 'send_page_view': true });

      // Call this after user grants consent
      window.grantAnalyticsConsent = function() {
        gtag('consent', 'update', { 'analytics_storage': 'granted' });
      };

      window.trackIDsVaultEvent = function(eventName, eventParams) {
        if (typeof gtag === 'function') {
          gtag('event', eventName, eventParams || {});
        }
      };
    </script>
